name: Bug Report
description: Report a bug in pokemon-lib-ts
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Install `@pokemon-lib-ts/gen1`
        2. Call `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or stack traces if applicable.
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@pokemon-lib-ts/core"
        - "@pokemon-lib-ts/battle"
        - "@pokemon-lib-ts/gen1"
        - "@pokemon-lib-ts/gen2"
        - "@pokemon-lib-ts/gen3"
        - "@pokemon-lib-ts/gen4"
        - "@pokemon-lib-ts/gen5"
        - "@pokemon-lib-ts/gen6"
        - "@pokemon-lib-ts/gen7"
        - "@pokemon-lib-ts/gen8"
        - "@pokemon-lib-ts/gen9"
        - Multiple / Unknown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: What version of the package are you using?
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: dropdown
    id: node-version
    attributes:
      label: Node.js Version
      options:
        - "20"
        - "22"
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or relevant information.
    validations:
      required: false
