name: Compliance Oracle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, edited]
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  oracle-fast:
    name: oracle (fast)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Generate changed-mechanics preview
        run: npm run proof:preview -- --mode fast
      - name: Run direct mutation audit
        run: npm run proof:audit:mutation -- --mode fast
      - name: Run oracle fast
        run: npm run oracle:fast
      - name: Post fast compliance summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const resultsPath = 'tools/oracle-validation/results/' + process.env.GITHUB_SHA + '/fast/summary.v1.json';
            if (!fs.existsSync(resultsPath)) process.exit(0);
            const output = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            let summary = '## Fast Compliance Check\\n\\n';
            summary += '| Gen | Conclusion | Data | Stats | GT | Damage | Mechanics | Terrain | Gimmicks | Edge Cases |\\n';
            summary += '|-----|------------|------|-------|----|--------|-----------|---------|----------|------------|\\n';
            for (const generation of output.generations ?? []) {
              const suites = generation.suites ?? {};
              const icon = (suite) => suites[suite] ? suites[suite].status : 'missing';
              summary += '| Gen ' + generation.gen + ' | ' + generation.conclusion + ' | ' + icon('data') + ' | ' + icon('stats') + ' | ' + icon('groundTruth') + ' | ' + icon('damage') + ' | ' + icon('mechanics') + ' | ' + icon('terrain') + ' | ' + icon('gimmicks') + ' | ' + icon('edgeCases') + ' |\\n';
            }
            fs.writeFileSync('/tmp/compliance-fast-comment.md', summary);
          "
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/compliance-fast-comment.md
      - name: Upload fast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-results-fast
          path: tools/oracle-validation/results/${{ github.sha }}/fast
          retention-days: 7

  oracle-full:
    name: oracle (full)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Generate changed-mechanics preview
        run: npm run proof:preview -- --mode full
      - name: Run direct mutation audit
        run: npm run proof:audit:mutation -- --mode full
      - name: Run oracle full
        run: npm run compliance
      - name: Post full compliance summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const resultsPath = 'tools/oracle-validation/results/' + process.env.GITHUB_SHA + '/full/summary.v1.json';
            if (!fs.existsSync(resultsPath)) process.exit(0);
            const output = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            let summary = '## Full Compliance Check\\n\\n';
            summary += '| Gen | Conclusion | Data | Stats | GT | Damage | Mechanics | Terrain | Gimmicks | Edge Cases | Replay | Trace | Smoke |\\n';
            summary += '|-----|------------|------|-------|----|--------|-----------|---------|----------|------------|--------|-------|-------|\\n';
            for (const generation of output.generations ?? []) {
              const suites = generation.suites ?? {};
              const icon = (suite) => suites[suite] ? suites[suite].status : 'missing';
              summary += '| Gen ' + generation.gen + ' | ' + generation.conclusion + ' | ' + icon('data') + ' | ' + icon('stats') + ' | ' + icon('groundTruth') + ' | ' + icon('damage') + ' | ' + icon('mechanics') + ' | ' + icon('terrain') + ' | ' + icon('gimmicks') + ' | ' + icon('edgeCases') + ' | ' + icon('replay') + ' | ' + icon('damageTrace') + ' | ' + icon('smoke') + ' |\\n';
            }
            fs.writeFileSync('/tmp/compliance-full-comment.md', summary);
          "
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/compliance-full-comment.md
      - name: Upload full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-results-full
          path: tools/oracle-validation/results/${{ github.sha }}/full
          retention-days: 30

  pret-validate:
    name: pret committed-data validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate pret overrides in committed data (Gen 1-4)
        run: npx tsx tools/data-importer/src/pret-overrides/validate-committed-data.ts
