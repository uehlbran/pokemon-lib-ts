name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:workflow
      - run: npm run test:all
      - run: npm run test:invariants
      - run: npm run build
      - run: npm run oracle:fast
      - run: npm run status:generate
      - run: npm run status:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:contracts

  package-boundaries:
    name: package-boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ci:package-boundaries

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:check

  changeset-check:
    name: Changeset Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check for changeset
        run: |
          # Only require a changeset when packages/*/src/ or packages/*/data/ changed.
          # Docs-only changes (CHANGELOG.md, README.md, tests) do not require a changeset.
          changed=$(git diff --name-only origin/main...HEAD -- 'packages/*/src/' 'packages/*/data/')
          if [ -n "$changed" ]; then
            npx changeset status --since=origin/main
          else
            echo "No publishable package source or data files changed — changeset not required."
          fi

  proof-gate:
    name: proof-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run proof:preview -- --mode ci-preview
      - run: npm run test:workflow
      - run: npm run test
      - run: npm run ci:package-boundaries
      - run: npm run typecheck:contracts
      - run: npm run validate:pret
      - run: npm run oracle:fast
      - run: npm run proof:enforce -- --mode ci-preview --executed-suite changeset-check --executed-suite oracle-fast --executed-suite package-boundaries --executed-suite pret-validate --executed-suite proof-preview --executed-suite test --executed-suite typecheck:contracts --executed-suite workflow-contract
